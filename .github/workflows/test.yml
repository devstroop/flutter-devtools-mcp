name: Test

on:
  push:
    branches: [main, dev]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
  pull_request:
    branches: [main, dev]
    paths:
      - '**.dart'
      - 'pubspec.yaml'

jobs:
  test:
    name: dart test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run unit tests
        run: dart test --exclude-tags integration

      - name: Check test fixture compiles
        working-directory: test/fixtures/test_app
        run: dart pub get

      - name: Analyze test fixture
        working-directory: test/fixtures/test_app
        run: dart analyze lib/
