name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: flutter_devtools_mcp-linux-x64
            target: x86_64-linux
          - os: macos-latest
            artifact: flutter_devtools_mcp-macos-arm64
            target: arm64-macos
          - os: windows-latest
            artifact: flutter_devtools_mcp-windows-x64.exe
            target: x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile binary
        run: dart compile exe bin/server.dart -o bin/${{ matrix.artifact }}

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bin/${{ matrix.artifact }}
          asset_name: ${{ matrix.artifact }}
          tag: ${{ github.ref }}
