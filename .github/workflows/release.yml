name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: linux
            runs-on: ubuntu-latest
            exe: flutter_devtools_mcp
            asset_name: flutter_devtools_mcp-linux-x64
            archive_ext: tar.gz
          - os: macos
            runs-on: macos-latest
            exe: flutter_devtools_mcp
            asset_name: flutter_devtools_mcp-macos-arm64
            archive_ext: tar.gz
          - os: windows
            runs-on: windows-latest
            exe: flutter_devtools_mcp.exe
            asset_name: flutter_devtools_mcp-windows-x64
            archive_ext: zip
            archive_cmd_powershell: true

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile binary
        run: dart compile exe bin/server.dart -o bin/${{ matrix.exe }}

      - name: Package archive (tar.gz)
        if: matrix.archive_cmd_powershell != true
        shell: bash
        run: |
          cd bin
          tar -czf ${{ matrix.asset_name }}.${{ matrix.archive_ext }} ${{ matrix.exe }}

      - name: Package archive (zip)
        if: matrix.archive_cmd_powershell == true
        shell: pwsh
        run: |
          Push-Location bin
          Compress-Archive -Path ${{ matrix.exe }} -DestinationPath ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
          Pop-Location

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: bin/${{ matrix.asset_name }}.${{ matrix.archive_ext }}
          asset_name: ${{ matrix.asset_name }}.${{ matrix.archive_ext }}
          tag: ${{ github.ref }}
